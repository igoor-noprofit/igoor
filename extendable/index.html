<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WAV Recorder with extendable-media-recorder (jspm.dev)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        button { margin: 10px; padding: 10px 20px; font-size: 16px; }
        canvas { display: block; margin: 20px auto; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Simple Audio Recorder (WAV via jspm.dev)</h1>
    <canvas id="volumeMeter" width="200" height="20"></canvas>
    <br>
    <button id="recordBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <button id="playBtn" disabled>Play Recording</button>
    <p id="status">Ready to record...</p>

    <script type="module">
        import { MediaRecorder, register } from 'https://jspm.dev/extendable-media-recorder';
        import { connect } from 'https://jspm.dev/extendable-media-recorder-wav-encoder';

        // Register the WAV encoder
        (async () => {
            await register(await connect());
        })();

        let mediaRecorder, stream, audioContext, analyser, dataArray;
        const canvas = document.getElementById('volumeMeter');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let recordedBlob = null;

        // Volume meter update loop
        function updateMeter() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let rms = 0;
            for (let i = 0; i < dataArray.length; i++) {
                rms += dataArray[i] ** 2;
            }
            const volume = Math.sqrt(rms / dataArray.length) / 255;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = volume > 0.8 ? 'red' : (volume > 0.5 ? 'orange' : 'green');
            ctx.fillRect(0, 0, volume * canvas.width, canvas.height);
            requestAnimationFrame(updateMeter);
        }

        // Initialize audio
        async function initAudio() {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            updateMeter(); // Start metering
        }

        // Setup MediaRecorder for WAV
        function setupRecorder() {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/wav' });
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedBlob = event.data;
                    document.getElementById('playBtn').disabled = false;
                    status.textContent = `Recorded: ${recordedBlob.size} bytes (WAV)`;
                }
            };
            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(track => track.stop());
                status.textContent = 'Recording stopped.';
            };
        }

        document.getElementById('recordBtn').onclick = async () => {
            await initAudio();
            setupRecorder();
            mediaRecorder.start(1000); // Collect data every second
            status.textContent = 'Recording...';
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('recordBtn').disabled = false;
        };

        document.getElementById('playBtn').onclick = async () => {
            if (!recordedBlob || !audioContext) return;
            const buffer = await audioContext.decodeAudioData(await recordedBlob.arrayBuffer());
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start(0);
            status.textContent = 'Playing back...';
        };
    </script>
</body>
</html>
