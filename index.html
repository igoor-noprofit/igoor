<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGOOR</title>
    <script src="js/vue@3.5.13.js"></script>
    <script src="js/vue3sfcloader.min.js"></script>
    <script src="js/sortable.min.js"></script>
    <script src="js/vuedraggable.umd.js"></script>
    <link href="css/app.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="js/app.js" type="module"></script>
    <script>
      function getWindowsScaleFactor() {
        return window.devicePixelRatio || 1;
      }

      function applyDPICounterScale() {
        const scale = getWindowsScaleFactor();
        const resizeFactor = 1.8; // 🔧 tweak this: try 0.9, 1.1, 0.95, etc.
        console.log("Windows scale factor detected:", scale);

        // Only apply counter-scale if DPI zoom > 150%
        if (scale > 1.5) {
          const inverseScale = (1 / scale) * resizeFactor;
          document.body.style.transformOrigin = "0 0";
          document.body.style.transform = `scale(${inverseScale})`;

          // Adjust layout bounds so no scrollbars appear
          document.body.style.width = `${(100 * scale) / resizeFactor}vw`;
          document.body.style.height = `${(100 * scale) / resizeFactor}vh`;
        } else {
          // Reset everything if scaling is not needed
          document.body.style.transform = "";
          document.body.style.width = "";
          document.body.style.height = "";
        }
      }

      window.addEventListener("load", applyDPICounterScale);
      window.addEventListener("resize", applyDPICounterScale);
    </script>
  </body>
</html>
