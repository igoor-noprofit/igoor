<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGOOR</title>
    <script src="js/vue@2.7.16.min.js"></script>
    <script src="js/vueloader.min.js"></script>
    <link href="css/app.css" rel="stylesheet" type="text/css" />
  
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const app = new Vue({
            el: '#app',
            components: {
                'Clock': httpVueLoader('/plugins/clock/frontend/clock_component.vue'), 'Geo': httpVueLoader('/plugins/geo/frontend/geo_component.vue'), 'Meteo': httpVueLoader('/plugins/meteo/frontend/meteo_component.vue'), 'Flow': httpVueLoader('/plugins/flow/frontend/flow_component.vue')
            },
            template: `
            <div>
                <header>
                    <div id="topbar">
                        <clock /><geo /><meteo />
                    </div>
                    <flow />
                </header>
                <main>
                    
                </main>
                <footer>
                    
                </header>
            </div>
            `
        });
    });
    </script>
    
</head>
  <body>
    <div id="app">
      <!-- Dynamic Vue components will be rendered here -->
    </div>
  </body>
</html>
