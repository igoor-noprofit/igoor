<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGOOR</title>
    <script src="js/vue@3.5.13.js"></script>
    <script src="js/vue3sfcloader.min.js"></script>
    <script src="js/sortable.min.js"></script>
    <script src="js/vuedraggable.umd.js"></script>
    <link href="css/app.css" rel="stylesheet" type="text/css" />
    <link href="css/phosphor-2.1.1-light.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/ensureBackendApi.js"></script>
    <script src="/js/readypy_bootstrap.js"></script>
    <script src="/js/app.js" type="module"></script>
    <script> 
    
      function getWindowsScaleFactor() {
        return window.devicePixelRatio || 1;
      }

      function applyDPICounterScale() {
        const scale = getWindowsScaleFactor();
        const resizeFactor = 1.8; // 🔧 tweak this to fine-tune
        console.log("Windows scale factor detected:", scale);

        const elements = document.querySelectorAll(
          ".plugin-settings-component"
        );

        elements.forEach((el) => {
          if (scale > 1.4) {
            console.warn('scaling');
            const inverseScale = (1 / scale) * resizeFactor;
            el.style.transformOrigin = "0 0";
            el.style.transform = `scale(${inverseScale})`;

            // Prevent overflow scrollbars for scaled content
            el.style.width = `${(100 * scale) / resizeFactor}vw`;
            el.style.height = `${(100 * scale) / resizeFactor}vh`;
          } else {
            // Reset styles when scaling not needed
            el.style.transform = "";
            el.style.width = "";
            el.style.height = "";
          }
        });
      }

      window.addEventListener("load", applyDPICounterScale);
      window.addEventListener("resize", applyDPICounterScale);
    </script>
  </body>
</html>
